; Optimized PHP-FPM Configuration for dockers/php
; Simple production configuration

[www]
; User and group configuration
user = www
group = www

; Listen configuration
listen = 9000
listen.backlog = 511

; Dynamic Process Manager - Optimized for production
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 15
pm.max_requests = 1000

; Request timeout settings
request_terminate_timeout = 300s
request_slowlog_timeout = 10s

; Logging configuration
catch_workers_output = yes
clear_env = yes

; Status and ping endpoints
pm.status_path = /status
ping.path = /ping
ping.response = pong

; Security settings
php_flag[display_errors] = off
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/php-fpm-error.log

; Memory and execution limits
php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 60
php_admin_value[max_input_time] = 60

; OPcache configuration
php_admin_flag[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 256
php_admin_value[opcache.interned_strings_buffer] = 16
php_admin_value[opcache.max_accelerated_files] = 10000
php_admin_value[opcache.revalidate_freq] = 0
php_admin_value[opcache.validate_timestamps] = 0
php_admin_value[opcache.save_comments] = 1
php_admin_value[opcache.enable_file_override] = 0

; JIT compilation for maximum performance
php_admin_value[opcache.jit_buffer_size] = 128M
php_admin_value[opcache.jit] = 1255

; Security settings
php_admin_value[expose_php] = Off
php_admin_value[allow_url_fopen] = Off
php_admin_value[allow_url_include] = Off
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen

; Session configuration
php_admin_value[session.save_handler] = files
php_admin_value[session.save_path] = /var/lib/php/sessions
php_admin_value[session.gc_maxlifetime] = 1440
php_admin_value[session.cookie_httponly] = On
php_admin_value[session.cookie_secure] = On
php_admin_value[session.use_strict_mode] = On

; Timezone and character set
php_admin_value[date.timezone] = UTC
php_admin_value[default_charset] = "UTF-8"
