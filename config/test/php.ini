; ================================
; PHP Test Configuration
; ================================

; Performance
memory_limit = 2G
max_execution_time = 0
max_input_time = 0

; Error handling
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php/error.log

; Timezone (UTC for tests)
date.timezone = UTC

; Security
expose_php = On

; Session
session.save_handler = files
session.save_path = /tmp

; Assertions
assert.active = On
assert.exception = On

; Disable OPcache for tests
opcache.enable = 0
opcache.enable_cli = 0
