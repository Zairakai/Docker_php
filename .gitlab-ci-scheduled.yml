# ================================
# SCHEDULED SECURITY SCAN
# ================================
# Pipeline déclenché par un schedule pour scanner les images latest
# Configure dans: CI/CD > Schedules > New schedule
# Recommended: Daily at 2 AM

stages:
  - security-audit

variables:
  DOCKERHUB_IMAGE: "zairakai/php"
  ALPINE_IMAGE: "alpine:latest"

.scan-latest-template:
  stage: security-audit
  image: ${ALPINE_IMAGE}
  before_script:
    - apk add --no-cache curl bash jq
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - |
      echo "━━━━━━━━━━━━━━━━"
      echo "🔒 Scheduled Security Audit: ${IMAGE_TAG}"
      echo "━━━━━━━━━━━━━━━━"
      echo ""

      # Scan avec rapport détaillé
      trivy image \
        --severity CRITICAL,HIGH,MEDIUM \
        --format json \
        --output trivy-audit-${TARGET}.json \
        "${DOCKERHUB_IMAGE}:${IMAGE_TAG}"

      # Rapport humain
      trivy image \
        --severity CRITICAL,HIGH \
        --format table \
        "${DOCKERHUB_IMAGE}:${IMAGE_TAG}" | tee trivy-summary-${TARGET}.txt

      # Parse les résultats
      CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-audit-${TARGET}.json)
      HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-audit-${TARGET}.json)
      MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "MEDIUM")] | length' trivy-audit-${TARGET}.json)

      echo ""
      echo "📊 Vulnerability Summary:"
      echo "   Critical: ${CRITICAL}"
      echo "   High:     ${HIGH}"
      echo "   Medium:   ${MEDIUM}"
      echo ""

      # Génère un rapport Markdown
      cat > security-report-${TARGET}.md <<EOF
      # 🔒 Security Audit Report

      **Image**: \`${DOCKERHUB_IMAGE}:${IMAGE_TAG}\`
      **Scan Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
      **Pipeline**: [#${CI_PIPELINE_ID}](${CI_PIPELINE_URL})

      ## Vulnerability Summary

      | Severity | Count |
      |----------|-------|
      | 🔴 Critical | ${CRITICAL} |
      | 🟠 High | ${HIGH} |
      | 🟡 Medium | ${MEDIUM} |

      ## Action Required

      EOF

      if [ "${CRITICAL}" -gt 0 ]; then
        echo "**🚨 CRITICAL vulnerabilities detected - immediate action required**" >> security-report-${TARGET}.md
        echo "" >> security-report-${TARGET}.md
        echo "\`\`\`" >> security-report-${TARGET}.md
        cat trivy-summary-${TARGET}.txt >> security-report-${TARGET}.md
        echo "\`\`\`" >> security-report-${TARGET}.md

        # Créer une issue GitLab automatiquement (optionnel)
        # curl --request POST --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        #   "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/issues" \
        #   --form "title=🔒 Critical vulnerabilities in ${IMAGE_TAG}" \
        #   --form "description=$(cat security-report-${TARGET}.md)"

      elif [ "${HIGH}" -gt 10 ]; then
        echo "**⚠️ High number of HIGH vulnerabilities - review recommended**" >> security-report-${TARGET}.md
      else
        echo "✅ No critical issues detected" >> security-report-${TARGET}.md
      fi

      cat security-report-${TARGET}.md
  artifacts:
    paths:
      - trivy-audit-*.json
      - trivy-summary-*.txt
      - security-report-*.md
    expire_in: 3 months
    when: always
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Scan des 3 images latest
audit:latest-prod:
  extends: .scan-latest-template
  variables:
    TARGET: prod
    IMAGE_TAG: latest

audit:latest-dev:
  extends: .scan-latest-template
  variables:
    TARGET: dev
    IMAGE_TAG: latest-dev

audit:latest-test:
  extends: .scan-latest-template
  variables:
    TARGET: test
    IMAGE_TAG: latest-test
